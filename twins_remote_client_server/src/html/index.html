<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="/style.css">
    <link rel="icon" href="favicon.ico">
    <title>Twins Remote Client</title>
</head>

<body>
    <h2>Twins Remote Client</h2>
    <div>
        <input id="sessionId" placeholder="session id" />
        <button onclick="copySessionId()">Copy</button>
    </div>
    <br>

    <div id="status" class="disconnected">未接続</div>

    <div class="controls">
        <button id="fullscreenBtn">Fullscreen</button>
        <div class="audioBtnOuter">
            <div id="audioBtn">
                <p>audio</p>
            </div>
        </div>
    </div>

    <div id="player">
        <video id="video" autoplay playsinline muted></video>
    </div>

    <pre id="log"></pre>

    <script src="/client.js"></script>
</body>

</html>
