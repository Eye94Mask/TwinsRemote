<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="/style.css">
    <link rel="icon" href="favicon.ico">
    <title>Twins Remote Client</title>
</head>

<body>
    <div id="splash" class="splash show">
        <div class="splash-card">
            <img src="/favicon.ico" alt="Twins Remote" class="splash-logo">
            <div class="splash-title">Twins Remote</div>
            <div id="splashSubtitle" class="splash-subtitle"></div>
        </div>
    </div>
    <header id="ticker" class="ticker">
        <ul>
            <li id="noticeList">
            </li>
        </ul>
    </header>
    <header class="sns-box">
        <a id="xLink" href="https://x.com/Eye94MaskTech" class="btn-sns btn-x">
            <svg xmlns="http://www.w3.org/2000/svg" height="1em" viewBox="0 0 512 512">
                <path d="M389.2 48h70.6L305.6 224.2 487 464H345L233.7 318.6 106.5 464H35.8L200.7 275.5 26.8 48H172.4L272.9 180.9 389.2 48zM364.4 421.8h39.1L151.1 88h-42L364.4 421.8z"></path>
            </svg>
        </a>
        <a id="repositoryLink" href="https://github.com/MeuShirokuma/TwinsRemote_v1/tree/master" class="bi bi-github btn-sns btn-github">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-github" viewBox="0 0 16 16">
                <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8"/>
            </svg>
        </a>
    </header>
    <h2>Twins Remote Client</h2>
    <div>
        <input id="sessionId" placeholder="session id" />
        <button id="copySessionIdBtn" onclick="copySessionId()">Copy</button>
    </div>
    <br>

    <div id="connectionStatus">
        <p>接続ステータス：</p>
        <div id="status" class="disconnected">未接続</div>
    </div>
    <div id="candidateTypeMessengerContainer">
        <p id="candidateTypeMessenger"></p>
        <p id="limitation"></p>
    </div>

    <div class="controls">
        <button id="fullscreenBtn" class="fullscreenBtn">フルスクリーン</button>
        <div class="audioArea" id="makeImg">
            <form id="audio">
                <input type="radio" name="audioToggle" id="audioOn">
                    <label for="audioOn">🔊</label>
                <input type="radio" name="audioToggle" id="audioOff" checked>
                    <label for="audioOff">🔇</label>
            </form>
        </div>
    </div>

    <div id="player">
        <video id="video" autoplay playsinline muted></video>
    </div>

    <pre id="log"></pre>

    <script src="/client.js"></script>
</body>

</html>
