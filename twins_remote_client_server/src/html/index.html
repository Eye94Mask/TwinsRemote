<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="/style.css">
    <link rel="icon" href="favicon.ico">
    <title>Twins Remote Client</title>
</head>

<body>
    <h2>Twins Remote Client</h2>
    <div>
        <input id="sessionId" placeholder="session id" />
        <button onclick="copySessionId()">Copy</button>
    </div>
    <br>

    <div id="status" class="disconnected">未接続</div>

    <div class="controls">
        <button id="fullscreenBtn">Fullscreen</button>
        <button id="audioBtn">Enable Audio</button>
    </div>

    <div id="player">
        <video id="video" autoplay playsinline muted></video>
    </div>

    <pre id="log"></pre>

    <div>
        <textarea id="offer" placeholder="Paste Offer here"></textarea>
        <br>
        <button id="connectBtn" onclick="connect()">Connect</button>

        <h3>Answer</h3>
        <textarea id="answer" placeholder="Copy Answer back to Host" readonly></textarea>
        <button id="copyAnswer">Copy Your Answer</button>
        <br>
    </div>

    <script src="/client.js"></script>
</body>

</html>
