<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="/style.css">
    <link rel="icon" href="favicon.ico">
    <title>Twins Remote Client</title>
</head>

<body>
    <h2>Twins Remote Client</h2>
    <div>
        <input id="sessionId" placeholder="session id" />
        <button id="copySessionIdBtn" onclick="copySessionId()">Copy</button>
    </div>
    <br>

    <div id="status" class="disconnected">未接続</div>

    <div class="controls">
        <button id="fullscreenBtn">Fullscreen</button>
        <div class="audioArea" id="makeImg">
            <form id="audio">
                <input type="radio" name="audioToggle" id="audioOn">
                    <label for="audioOn">🔊</label>
                <input type="radio" name="audioToggle" id="audioOff" checked>
                    <label for="audioOff">🔇</label>
            </form>
        </div>
    </div>

    <div id="player">
        <video id="video" autoplay playsinline muted></video>
    </div>

    <pre id="log"></pre>

    <script src="/client.js"></script>
</body>

</html>
