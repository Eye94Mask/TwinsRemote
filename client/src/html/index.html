<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="../style/style.css">
    <title>Remote Play Client</title>
</head>

<body>
    <h2>Remote Play Client</h2>
    <textarea id="offer" placeholder="Paste Offer here"></textarea>
    <br>
    <button onclick="connect()">Connect</button>

    <h3>Answer</h3>
    <textarea id="answer" placeholder="Copy Answer back to Host" readonly></textarea>
    <button onclick="copyAnswer()">Copy Your Answer</button>
    <br>

    <h3>Your ICE</h3>
    <textarea id="ice" placeholder="Copy ICE back to Host" readonly></textarea>
    <button onclick="copyIceCandidate()">Copy Your ICE</button>
    <br>

    <textarea id="host" placeholder="Paste Host ICE here"></textarea>
    <br>
    <button onclick="onHostIce()">ICE</button>

    <h3>Stats</h3>
    <textarea onclick="showStats()"> Get Video Stats</textarea>
    <pre id="stats"></pre>

    <video id="video" autoplay playsinline></video>

    <script src="../js/client.js"></script>
</body>

</html>
